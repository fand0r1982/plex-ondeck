<!DOCTYPE html>
<html>
<head>
<title>✨ Plex Catch-up</title>
<meta name="viewport" content="width=device-width">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a15;--card:#0f0f23;--accent:#7c3aed;--accent-glow:#a78bfa;--text:#f8fafc;--text-s:#cbd5e1;}
* {box-sizing:border-box;}
body {font-family:'Inter',sans-serif;margin:0;padding:20px 20px 60px;background:radial-gradient(circle at 20% 80%,#667eea33 0%,transparent 50%),radial-gradient(circle at 80% 20%,#764ba233 0%,transparent 50%),var(--bg);color:var(--text);min-height:100vh;}
.header {text-align:center;margin:0 0 50px;padding:20px 0;}
h1 {font-size:clamp(2em,6vw,3.5em);font-weight:700;background:linear-gradient(135deg,var(--accent-glow),#fbbf24);background-clip:text;-webkit-background-clip:text;color:transparent;letter-spacing:-0.02em;margin:0;position:relative;}
h1::after {content:'';display:block;width:60px;height:4px;background:linear-gradient(var(--accent),var(--accent-glow));margin:12px auto;border-radius:2px;}
.subtitle {color:var(--text-s);font-size:1.15em;font-weight:400;margin:16px 0 0;}
.list {display:grid;gap:24px;max-width:1100px;margin:0 auto;}
.card {background:var(--card);border-radius:24px;padding:32px;position:relative;overflow:hidden;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);backdrop-filter:blur(16px);border:1px solid rgba(124,58,237,0.15);}
.card::before {content:'';position:absolute;inset:0;background:linear-gradient(145deg,rgba(124,58,237,0.05),transparent);opacity:0;transition:opacity 0.3s;}
.card:hover::before {opacity:1;}
.card:hover {transform:translateY(-12px) scale(1.02);box-shadow:0 35px 80px -20px rgba(124,58,237,0.3);}
.episode-header {display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:16px;}
.series {font-size:1.5em;font-weight:600;color:var(--text);margin:0;line-height:1.2;}
.ep-details {color:var(--text-s);font-size:1em;font-weight:500;background:rgba(124,58,237,0.1);padding:6px 12px;border-radius:8px;display:inline-block;}
.btn {position:relative;background:linear-gradient(135deg,var(--accent),var(--accent-glow));color:white;border:none;padding:14px 28px;border-radius:16px;font-weight:600;font-size:1em;cursor:pointer;overflow:hidden;transition:all 0.3s;min-width:200px;box-shadow:0 8px 25px rgba(124,58,237,0.3);}
.btn::before {content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transition:left 0.5s;}
.btn:hover {transform:translateY(-3px);box-shadow:0 15px 40px rgba(124,58,237,0.4);}
.btn:hover::before {left:100%;}
.summary {margin-top:24px;padding:24px;border-radius:20px;background:rgba(124,58,237,0.08);backdrop-filter:blur(20px);border:1px solid rgba(124,58,237,0.2);line-height:1.75;font-size:0.98em;animation:slideIn 0.5s ease-out;}
.loading {color:var(--text-s);font-style:italic;}
.error {color:#f59e0b;background:rgba(245,158,11,0.1);border-color:#f59e0b;}
@keyframes slideIn {from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
@media (max-width:768px) {.episode-header{flex-direction:column;align-items:flex-start;gap:12px;}.btn{width:100%;}}
</style>
</head>
<body>
<div class="header">
  <h1>Plex Catch-up</h1>
  <p class="subtitle">AI-powered "Was bisher geschah?" für deine On-Deck Serien</p>
</div>
<div class="list">
{% for item in ondeck %}
<div class="card">
  <div class="episode-header">
    <div>
      <div class="series">{{ item.show_title }}</div>
      <div class="ep-details">S{{ item.season }}E{{ item.episode }}: {{ item.ep_title }}</div>
    </div>
  </div>
  <button class="btn" onclick="getSummary('{{ item.title }}', {{ item.season }}, {{ item.episode }}, '{{ item.show_title }}')">✨ Erinnerung laden</button>
  <div class="summary" id="sum-{{ item.title }}"></div>
</div>
{% endfor %}
</div>
<script>
async function getSummary(title, season, episode, show) {
  const div = document.getElementById(`sum-${title}`);
  div.innerHTML = '<span class="loading">KI analysiert Handlung... ✨</span>';
  try {
    const res = await fetch(`/summary/${title}/${season}/${episode}`);
    const data = await res.json();
    if (data.error) {
      div.innerHTML = `<span class="error">⚠️ ${data.error}</span>`;
    } else {
      div.innerHTML = data.summary.replace(/\n/g, '<br>');
    }
  } catch(e) {
    div.innerHTML = `<span class="error">⚠️ ${e.message}</span>`;
  }
}
</script>
</body>
</html>
