<!DOCTYPE html>
<html>
<head>
<title>Plex On-Deck</title>
<style> li {margin:10px;} button {margin-left:10px;} div {color:blue; margin:5px;} </style>
</head>
<body>
<h1>Deine On-Deck Serien (erster ungesehener Episoden)</h1>
<ul>
{% for item in ondeck %}
<li>
  <strong>{{ item.show_grandparent }}</strong> S{{ item.season }}E{{ item.episode }}: {{ item.ep_title }}
  <button onclick="getSummary('{{ item.title }}', {{ item.season }}, {{ item.episode }})">Summary laden</button>
  <div id="sum-{{ item.title }}"></div>
</li>
{% endfor %}
</ul>
<script>
async function getSummary(title, season, episode) {
  try {
    const res = await fetch(`/summary/${title}/${season}/${episode}`);
    if (!res.ok) throw new Error('API Fehler');
    const data = await res.json();
    if (data.error) {
      document.getElementById(`sum-${title}`).innerHTML = `<em>Fehler: ${data.error}</em>`;
    } else {
      document.getElementById(`sum-${title}`).innerHTML = `<strong>Summary:</strong> ${data.summary}`;
    }
  } catch (e) {
    document.getElementById(`sum-${title}`).innerHTML = `<em>Netzwerkfehler: ${e.message}</em>`;
  }
}
</script>
</body>
</html>
